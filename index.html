<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <script>
      // Theme Store preview: apply CSS vars from ?__theme=<base64-JSON>
      (function () {
        var t = new URLSearchParams(location.search).get('__theme');
        if (t) try {
          var v = JSON.parse(atob(t));
          for (var k in v) document.documentElement.style.setProperty(k, v[k]);
        } catch (e) {}
      }());
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
